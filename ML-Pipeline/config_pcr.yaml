# Config file for MAMA-MIA PCR Prediction Pipeline
feature_toggles:
  use_vascular: true   # Vascular features
  use_clinical: true   # Clinical features
  use_radiomics: false # Bella's baseline (radiomics)

experiment_setup:
  name: "mamamia_baseline_v1"
  base_outdir: "./ML-Pipeline/experiments" 

model_params:
  model: "rf" #rf or lr
  test_size: 0.2
  n_splits: 5 #per Daniel Luna's evaluator
  val_size: 0.2
  bootstrap_n: 1000
  random_state: 42

data_paths:
  feature_dir: "/net/projects2/vanguard/MAMA-MIA-syn60868042/patient_info_files"
  labels_csv: "/net/projects2/vanguard/MAMA-MIA-syn60868042/pcr_labels.csv"
  label_column: "pcr"
  id_column: "patient_id"