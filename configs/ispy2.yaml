# Config file for MAMA-MIA PCR Prediction Pipeline
feature_toggles:
  use_vascular: true
  use_morphometry: true
  require_centerline_file: true
  include_missing_centerline_rows: false
  use_clinical: false
  include_site_features: false
  dataset_include: ["ISPY2"]
  bilateral_filter: null # set to false for unilateral-only ISPY2 runs
  use_tumor_local_features: true
  use_tumor_graph_features_json: true
  tumor_mask_file_pattern: "{case_id}.nii.gz"
  tumor_mask_threshold: 0.5
  tumor_radius_voxels: [0, 2, 4, 8]
  use_radiomics: false
  merge_how: "inner"

experiment_setup:
  name: "mamamia_ispy2_morph_graph_enet"
  base_outdir: "./experiments"

model_params:
  model: "lr" # "lr" or "rf"
  penalty: "elasticnet"
  solver: "saga"
  l1_ratio: 0.5
  C: 1.0
  n_splits: 5
  random_state: 42
  max_iter: 3000
  feature_select_enabled: false
  feature_select_mode: "global_topk" # "global_topk" or "block_kinematic"
  feature_select_k: 128
  feature_select_k_kin: 0
  feature_select_kin_method: "topk_auc" # "topk_auc" or "mrmr"
  feature_select_kinematic_prefixes: ["kinematic_"]
  feature_select_max_abs_corr: null
  feature_select_max_zero_rate: null
  feature_select_min_non_na_rate: 0.2
  feature_select_min_n_unique: 2
  feature_select_mrmr_redundancy_weight: 1.0
  feature_select_mrmr_include_baseline: true
  feature_select_corr_gate_against_baseline: true
  nested_tune_enabled: false
  nested_inner_splits: 3
  nested_c_grid: [1.0]
  nested_l1_ratio_grid: [0.5]
  nested_feature_select_mode_grid: ["block_kinematic"]
  nested_k_kin_grid: [0, 16, 32, 64]
  nested_kin_method_grid: ["topk_auc", "mrmr"]
  nested_max_abs_corr_grid: [0.95]
  nested_max_zero_rate_grid: [0.95]
  n_estimators: 300
  max_depth: null
  min_samples_leaf: 1
  use_group_split: false
  group_col: "site"
  stratum_col: "tumor_subtype"

data_paths:
  centerline_root: "/net/projects2/vanguard/centerlines_tc4d/studies"
  tumor_mask_root: "/net/projects2/vanguard/MAMA-MIA-syn60868042/segmentations/expert"
  patient_info_dir: "/net/projects2/vanguard/MAMA-MIA-syn60868042/patient_info_files"
  clinical_excel: "/net/projects2/vanguard/MAMA-MIA-syn60868042/clinical_and_imaging_info.xlsx"
  labels_csv: "/net/projects2/vanguard/MAMA-MIA-syn60868042/pcr_labels.csv"
  label_column: "pcr"
  id_column: "case_id"
  radiomics_csv: ""
