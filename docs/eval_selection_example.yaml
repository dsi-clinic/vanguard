# Example YAML config for evaluation selection criteria.
# Use with --config when running baseline_model_example.py or export_splits.py.
# All fields under "selection" are optional; omit or set to null for no filter.
#
# Usage:
#   python examples/baseline_model_example.py --model random \
#     --excel-metadata path/to/metadata.xlsx --config docs/eval_selection_example.yaml
#   python export_splits.py --excel metadata.xlsx --output splits.csv --config docs/eval_selection_example.yaml

selection:
  datasets: [ISPY2, DUKE]
  sites: null              # null = no filter (include all)
  tumor_types: null        # e.g. [luminal, triple_negative]
  unilateral_only: false
  bilateral_only: false
  # tumor_type_col: subtype   # optional, default "subtype"
  # laterality_col: bilateral # optional, auto-detected from "bilateral" or "laterality"
  # column_filters:           # generic column -> allowed values
  #   some_custom_col: [A, B]
