experiment_name: combat_matrix_all_mrmr20

paths:
  # Cluster data paths — update these to match your environment
  images: /net/projects2/vanguard/MAMA-MIA-syn60868042/images
  masks: /net/projects2/vanguard/MAMA-MIA-syn60868042/segmentations/expert
  # Repo-relative paths
  labels: labels.csv
  splits: splits_train_test_ready.csv
  outdir: outputs/combat_matrix_all_mrmr20
  params_yaml: pyradiomics_params.yaml
  # Update this to point to your shared extraction output
  extract_outdir: outputs/shared_extraction/peri5_multiphase_logreg_feature_selection-kbest_k_best-10

extract:
  image_patterns:
    - "{pid}/{pid}_0001.nii.gz"
    - "{pid}/{pid}_0002.nii.gz"
  mask_pattern: "{pid}.nii.gz"
  peri_radius_mm: 5
  peri_mode: 3d
  force_2d: false
  force_2d_dimension: 0
  n_jobs: 8
  label_override: 1
  non_scalar_handling: concat
  aggregate_stats: [mean, std, min, max]
  hybrid_concat_threshold: 5

train:
  classifier: logistic
  logreg_penalty: elasticnet
  logreg_l1_ratio: 0.5
  corr_threshold: 0.9
  k_best: 20
  feature_selection: mrmr
  grid_search: true
  cv_folds: 5
  cv_only: true
  include_subtype: false
  include_site: false
  exclude_feature_regex:
    - "(^|_)shape(_|$)"
  harmonization_mode: none
  harmonization_batch_col: site
  harmonization_covariates:
    - tumor_subtype
