# ---------------------------------------------------------------------------
# Experiment: kinetic parameter maps + raw phases · logistic regression
#
# Requires: generate_kinetic_maps.py has already been run for all patients.
# Kinetic maps live at ~/vanguard/radiomics/kinetic_maps/{pid}/
# ---------------------------------------------------------------------------
experiment_name: kinetic_maps_logreg

paths:
  # Cluster data paths — update these to match your environment
  images:      /net/projects2/vanguard/MAMA-MIA-syn60868042/images
  masks:       /net/projects2/vanguard/MAMA-MIA-syn60868042/segmentations/expert
  # Repo-relative paths
  labels:      labels.csv
  splits:      splits_train_test_ready.csv
  outdir:      outputs/kinetic_maps_logreg
  params_yaml: pyradiomics_params.yaml

extract:
  image_patterns:
    - "{pid}/{pid}_0001.nii.gz"
    - "{pid}/{pid}_0002.nii.gz"
    - "kinetic_maps/{pid}/{pid}_kinetic_E_early.nii.gz"
    - "kinetic_maps/{pid}/{pid}_kinetic_E_peak.nii.gz"
    - "kinetic_maps/{pid}/{pid}_kinetic_slope_in.nii.gz"
    - "kinetic_maps/{pid}/{pid}_kinetic_slope_out.nii.gz"
    - "kinetic_maps/{pid}/{pid}_kinetic_AUC.nii.gz"
  mask_pattern:    "{pid}.nii.gz"
  peri_radius_mm:  5
  peri_mode:       3d
  force_2d:        false
  force_2d_dimension: 0
  n_jobs:          8
  label_override:  1
  non_scalar_handling: concat
  aggregate_stats: [mean, std, min, max]
  hybrid_concat_threshold: 5

train:
  classifier:      logistic
  logreg_penalty:  elasticnet
  logreg_l1_ratio: 0.5
  corr_threshold:  0.9
  k_best:          50
  grid_search:     true
  cv_folds:        5
  include_subtype: false
