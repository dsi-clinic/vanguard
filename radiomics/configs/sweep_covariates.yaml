# ---------------------------------------------------------------------------
# Sweep: categorical covariate encoding
#
# Goal: test whether ordinal coding of subtype/site is hurting performance.
# Uses the same shared extraction as the reference experiment; this is training-only.
#
# Grid: 2 (include_site) x 2 (categorical_encoding) = 4 configs
#   include_subtype is fixed True to match the reference setup.
# ---------------------------------------------------------------------------
base_config: configs/exp_peri5_multiphase_logreg.yaml

sweep:
  # Update this path to point to your shared extraction output directory
  paths.extract_outdir:
    - outputs/shared_extraction/peri5_multiphase_logreg_feature_selection-kbest_k_best-10

  train.include_subtype:
    - true

  train.include_site:
    - false
    - true

  train.categorical_encoding:
    - ordinal
    - onehot
