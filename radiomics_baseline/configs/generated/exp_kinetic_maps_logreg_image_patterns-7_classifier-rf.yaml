experiment_name: kinetic_maps_logreg_image_patterns-7_classifier-rf
paths:
  images: /net/projects2/vanguard/MAMA-MIA-syn60868042/images
  masks: /net/projects2/vanguard/MAMA-MIA-syn60868042/segmentations/expert
  labels: /home/summe/vanguard/radiomics_baseline/labels.csv
  splits: /home/summe/vanguard/radiomics_baseline/splits_train_test_ready.csv
  outdir: /home/summe/vanguard/radiomics_baseline/outputs/kinetic_maps_logreg_image_patterns-7_classifier-rf
  params_yaml: /home/summe/vanguard/radiomics_baseline/pyradiomics_params.yaml
  extract_outdir: /home/summe/vanguard/radiomics_baseline/outputs/shared_extraction/kinetic_maps_logreg_image_patterns-7_classifier-logistic
extract:
  image_patterns:
  - '{pid}/{pid}_0001.nii.gz'
  - '{pid}/{pid}_0002.nii.gz'
  - /home/summe/vanguard/radiomics_baseline/kinetic_maps/{pid}/{pid}_kinetic_E_early.nii.gz
  - /home/summe/vanguard/radiomics_baseline/kinetic_maps/{pid}/{pid}_kinetic_E_peak.nii.gz
  - /home/summe/vanguard/radiomics_baseline/kinetic_maps/{pid}/{pid}_kinetic_slope_in.nii.gz
  - /home/summe/vanguard/radiomics_baseline/kinetic_maps/{pid}/{pid}_kinetic_slope_out.nii.gz
  - /home/summe/vanguard/radiomics_baseline/kinetic_maps/{pid}/{pid}_kinetic_AUC.nii.gz
  mask_pattern: '{pid}.nii.gz'
  peri_radius_mm: 5
  peri_mode: 3d
  force_2d: false
  force_2d_dimension: 0
  n_jobs: 8
  label_override: 1
  non_scalar_handling: concat
  aggregate_stats:
  - mean
  - std
  - min
  - max
  hybrid_concat_threshold: 5
train:
  classifier: rf
  logreg_penalty: elasticnet
  logreg_l1_ratio: 0.5
  corr_threshold: 0.9
  k_best: 50
  grid_search: true
  cv_folds: 5
  include_subtype: true
