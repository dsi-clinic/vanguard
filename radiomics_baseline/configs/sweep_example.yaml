# ---------------------------------------------------------------------------
# Ablation sweep: peri radius × image phases × classifier
#
# Cartesian product → 4 × 2 × 3 = 24 experiment configs.
# Configs that share the same extraction parameters (i.e. every combination
# of peri_radius_mm and image_patterns) are pointed at the same extraction
# output by the ablation runner, so only 4 × 2 = 8 extraction jobs actually
# run.  The remaining 16 runs skip straight to training.
# -----------------------gi----------------------------------------------------
base_config: configs/exp_peri5_multiphase_logreg.yaml

sweep:
  extract.peri_radius_mm:
    - 0
    - 2.5
    - 5
    - 10

  # Each entry is a *list* of patterns — that list becomes image_patterns.
  extract.image_patterns:
    - ["{pid}/{pid}_0001.nii.gz"]
    - ["{pid}/{pid}_0001.nii.gz", "{pid}/{pid}_0002.nii.gz"]

  train.classifier:
    - logistic
    - rf
    - xgb