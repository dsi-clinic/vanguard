# ---------------------------------------------------------------------------
# Sweep: mRMR vs ANOVA k-best feature selection  (logistic / elasticnet only)
#
# Compares the two filter methods across a range of K values.
# Corr-pruning (0.9) is applied before both so the only variable is how
# the surviving features are ranked and selected.
#
# Grid:  2 methods × 3 K values = 6 configs  (1 shared extraction)
# Tip:   mRMR tends to win at small K (10-20); gap narrows at K=50.
# ---------------------------------------------------------------------------
base_config: configs/exp_peri5_multiphase_logreg.yaml

sweep:
  train.feature_selection:
    - kbest
    - mrmr

  train.k_best:
    - 10
    - 20
    - 50
