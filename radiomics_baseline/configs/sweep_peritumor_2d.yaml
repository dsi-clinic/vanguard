# ---------------------------------------------------------------------------
# Sweep: peritumor configuration — 2D extraction only  (logistic / elasticnet)
#
# peri_mode=2d × force_2d × {0, 2.5, 5} mm = 6 configs
# 2D extraction is ~3× faster (~18 min/config) → ~2 h total (fits in 3 h)
#
# Can run in parallel with sweep_peritumor_3d.yaml.
# ---------------------------------------------------------------------------
base_config: configs/exp_peri5_multiphase_logreg.yaml

sweep:
  extract.peri_mode:
    - 2d

  extract.force_2d:
    - false
    - true

  extract.peri_radius_mm:
    - 0      # tumor mask only — no peritumoral shell
    - 2.5
    - 5
