# ---------------------------------------------------------------------------
# Sweep: peritumor configuration — 3D extraction only  (logistic / elasticnet)
#
# peri_mode=3d × force_2d × {0, 2.5, 5} mm = 6 configs
# Worst-case extraction: ~55 min/config → ~5.5 h total (fits in 6 h wall time)
#
# Run this first; sweep_peritumor_2d.yaml can run in parallel.
# ---------------------------------------------------------------------------
base_config: configs/exp_peri5_multiphase_logreg.yaml

sweep:
  extract.peri_mode:
    - 3d

  extract.force_2d:
    - false
    - true

  extract.peri_radius_mm:
    - 0      # tumor mask only — no peritumoral shell
    - 2.5
    - 5
